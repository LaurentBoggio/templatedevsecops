name: DevSecOps Zéro Vulnérabilité

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read
  checks: write
  statuses: write
  packages: write
  security-events: write

jobs:
  secret-scan:
    name: Scan des secrets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.26'
      - name: Installer Gitleaks CLI
        run: |
          go install github.com/zricethezav/gitleaks/v8@latest
          echo "$HOME/go/bin" >> "$GITHUB_PATH"
      - name: Scan avec Gitleaks
        run: |
          gitleaks detect --source . --config .gitleaks.toml --report-format sarif --report-path results.sarif

  code-scan:
    name: Analyse CodeQL
    needs: secret-scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Initialiser CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript
      - name: Exécuter CodeQL
        uses: github/codeql-action/analyze@v3

  dependency-audit:
    name: Audit des dépendances
    needs: secret-scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Détecter les fichiers de dépendances
        id: detect-deps
        run: |
          {
            echo "package_json=$(if [ -f package.json ]; then echo true; else echo false; fi)"
            echo "package_lock=$(if [ -f package-lock.json ]; then echo true; else echo false; fi)"
            echo "requirements=$(if [ -f requirements.txt ]; then echo true; else echo false; fi)"
          } >> "$GITHUB_OUTPUT"

      - name: Installer les dépendances npm
        if: steps.detect-deps.outputs.package_json == 'true' || steps.detect-deps.outputs.package_lock == 'true'
        run: |
          npm ci

      - name: Audit npm
        if: steps.detect-deps.outputs.package_json == 'true' || steps.detect-deps.outputs.package_lock == 'true'
        run: npm audit --audit-level=moderate

      - name: Installer les dépendances Python
        if: steps.detect-deps.outputs.requirements == 'true'
        run: |
          python -m pip install --upgrade pip
          python -m pip install pip-audit
          python -m pip install -r requirements.txt

      - name: Audit pip
        if: steps.detect-deps.outputs.requirements == 'true'
        run: python -m pip audit --disable-pip-version-check

  lint:
    name: Qualité de code
    needs: secret-scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Exécuter Super-Linter
        uses: github/super-linter@v5
        env:
          VALIDATE_ALL_CODEBASE: true
          FILTER_REGEX_EXCLUDE: 'node_modules'
          DEFAULT_BRANCH: main
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  test:
    name: Tests
    needs: [secret-scan, dependency-audit]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Installer les dépendances
        run: npm install
      - name: Exécuter les tests
        run: npm test

  docker-build:
    name: Build and push Docker image
    needs: [test, lint]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v5
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository }}/template-devsecops:latest

